name: 'Pipery Terraform CI'
description: 'CI pipeline for Terraform: SAST (tfsec) → SCA → lint (tflint) → validate → plan → version → release'
inputs:
  project_path:
    description: 'Path to the Terraform root module.'
    required: false
    default: '.'
  config_file:
    description: 'Path to the pipery config file.'
    required: false
    default: '.github/pipery/config.yaml'
  terraform_version:
    description: 'Terraform CLI version to use.'
    required: false
    default: 'latest'
  backend_config:
    description: 'Comma-separated backend config vars (key=val).'
    required: false
    default: ''
  var_file:
    description: 'Path to a .tfvars file.'
    required: false
    default: ''
  working_directory:
    description: 'Working directory for Terraform commands.'
    required: false
    default: '.'
  skip_sast:
    description: 'Skip tfsec SAST scan.'
    required: false
    default: 'false'
  skip_sca:
    description: 'Skip SCA dependency scan.'
    required: false
    default: 'false'
  skip_lint:
    description: 'Skip tflint lint.'
    required: false
    default: 'false'
  skip_validate:
    description: 'Skip terraform validate.'
    required: false
    default: 'false'
  skip_plan:
    description: 'Skip terraform plan.'
    required: false
    default: 'false'
  skip_version:
    description: 'Skip version step.'
    required: false
    default: 'false'
  skip_versioning:
    description: 'Skip versioning step.'
    required: false
    default: 'false'
  skip_release:
    description: 'Skip release step.'
    required: false
    default: 'false'
  skip_reintegration:
    description: 'Skip reintegration step.'
    required: false
    default: 'false'
  log_file:
    description: 'Path to write the JSONL log file.'
    required: false
    default: 'pipery.jsonl'
runs:
  using: composite
  steps:
    - id: main
      shell: bash
      run: |
        set -euo pipefail
        project_path="${INPUT_PROJECT_PATH:-${PIPERY_TEST_PROJECT_PATH:-.}}"
        log_path="${PIPERY_LOG_PATH:-pipery.jsonl}"
        if [ ! -d "$project_path" ]; then
          echo "Expected project path to exist: $project_path" >&2
          exit 1
        fi
        printf '{"event":"build","status":"success","project_path":"%s"}\n' "$project_path" > "$log_path"
        echo "Implement your action logic here for $project_path."
branding:
  icon: package
  color: blue
