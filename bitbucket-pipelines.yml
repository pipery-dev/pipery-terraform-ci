# ============================================================================
# Bitbucket Pipelines Configuration for pipery-terraform-ci
# Production-Ready Terraform CI Pipeline
# ============================================================================
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to pipery-terraform-ci repository root as bitbucket-pipelines.yml
# 2. Configure Protected Variables in Bitbucket
# 3. Set SKIP_* variables to 'true' to disable specific stages
#
# PROTECTED VARIABLES TO CONFIGURE:
# - GITHUB_TOKEN: GitHub API token for reintegration (Mark as Secured)
# - TF_VAR_* variables for Terraform variables (Mark as Secured if sensitive)

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository checked out by Bitbucket Pipelines"
          - ls -la

    - step: &setup-step
        name: Setup Terraform Environment
        image: hashicorp/terraform:latest
        script:
          - terraform version
          - cd "${PROJECT_PATH:-.}/${WORKING_DIRECTORY:-.}"
          - |
            if [ -n "${BACKEND_CONFIG:-}" ]; then
              terraform init -backend-config="${BACKEND_CONFIG}"
            else
              terraform init
            fi
        artifacts:
          - "${PROJECT_PATH:-.}/${WORKING_DIRECTORY:-.}/.terraform/"
          - "${PROJECT_PATH:-.}/${WORKING_DIRECTORY:-.}/.terraform.lock.hcl"

    - step: &sast-scan
        name: SAST Security Scan
        image: aquasec/tfsec:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-sast.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - tfsec-report.json
          - tfsec.sarif

    - step: &sca-scan
        name: SCA Dependency Scan
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-sca.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_CONFIG_FILE: ${CONFIG_FILE:-.pipery/config.yaml}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &lint-step
        name: Terraform Linting
        image: ghcr.io/terraform-linters/tflint:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-lint.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - tflint-report.json

    - step: &validate-step
        name: Validate Terraform Configuration
        image: hashicorp/terraform:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-validate.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &plan-step
        name: Plan Terraform Changes
        image: hashicorp/terraform:latest
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-plan.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_WORKING_DIRECTORY: ${WORKING_DIRECTORY:-.}
          INPUT_VAR_FILE: ${VAR_FILE}
          INPUT_BACKEND_CONFIG: ${BACKEND_CONFIG}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - tfplan
          - tfplan.txt

    - step: &versioning-step
        name: Version & Summary
        image: python:3.11-alpine
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-version.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}
        artifacts:
          - version_info.txt
          - ${LOG_FILE:-pipery.jsonl}

    - step: &release-step
        name: Release Plan
        image: alpine:latest
        trigger: manual
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-release.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &reintegration-step
        name: Reintegration to Target Branch
        image: alpine:latest
        trigger: manual
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-reintegrate.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Collecting logs and artifacts..."
          - |
            if [ -f "${LOG_FILE:-pipery.jsonl}" ]; then
              echo "Log file size: $(wc -c < ${LOG_FILE:-pipery.jsonl}) bytes"
            fi
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}
          - version_info.txt
          - tfplan
          - tfplan.txt
          - tfsec-report.json
          - tfsec.sarif
          - tflint-report.json

variables:
  # Build Configuration
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  WORKING_DIRECTORY: "."
  TERRAFORM_VERSION: "latest"

  # Terraform Configuration
  BACKEND_CONFIG: ""  # Comma-separated backend configs
  VAR_FILE: ""  # Terraform variables file

  # Feature Flags
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_VALIDATE: "false"
  SKIP_PLAN: "false"
  SKIP_VERSIONING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"

  # Logging & Tracking
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - parallel:
        - step: *sast-scan
        - step: *sca-scan
    - step:
        <<: *lint-step
        condition:
          variable:
            - SKIP_LINT = "false"
        optional: true
    - step:
        <<: *validate-step
        condition:
          variable:
            - SKIP_VALIDATE = "false"
    - step:
        <<: *plan-step
        condition:
          variable:
            - SKIP_PLAN = "false"
    - step:
        <<: *versioning-step
        condition:
          variable:
            - SKIP_VERSIONING = "false"
    - step: *logs-step

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *validate-step
          condition:
            variable:
              - SKIP_VALIDATE = "false"
      - step:
          <<: *plan-step
          condition:
            variable:
              - SKIP_PLAN = "false"
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step

  pull-requests:
    feature/**:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *validate-step
          condition:
            variable:
              - SKIP_VALIDATE = "false"
      - step:
          <<: *plan-step
          condition:
            variable:
              - SKIP_PLAN = "false"
      - step: *logs-step

  custom:
    release:
      - step: *checkout-step
      - step: *setup-step
      - parallel:
          - step: *sast-scan
          - step: *sca-scan
      - step:
          <<: *lint-step
          condition:
            variable:
              - SKIP_LINT = "false"
          optional: true
      - step:
          <<: *validate-step
          condition:
            variable:
              - SKIP_VALIDATE = "false"
      - step:
          <<: *plan-step
          condition:
            variable:
              - SKIP_PLAN = "false"
      - step:
          <<: *versioning-step
          condition:
            variable:
              - SKIP_VERSIONING = "false"
      - step:
          <<: *release-step
          condition:
            variable:
              - SKIP_RELEASE = "false"
      - step:
          <<: *reintegration-step
          condition:
            variable:
              - SKIP_REINTEGRATION = "false"
          optional: true
      - step: *logs-step

# ============================================================================
# CONFIGURATION NOTES:
# ============================================================================
#
# Terraform Workflow:
#   - Stages differ slightly from other pipelines (validate/plan instead of build/test)
#   - Plan artifacts are stored for review before manual apply
#   - tfsec and tflint provide infrastructure-as-code security scanning
#
# Protected Variables:
#   - Set TF_VAR_* variables in Bitbucket for Terraform input variables
#   - Backend configuration via BACKEND_CONFIG variable
#   - Document all variables in terraform/variables.tf
#
# Drift Detection:
#   - Reintegration step can be extended to run periodic drift detection
#   - Compare actual infrastructure state with planned state
#
# Manual Approval:
#   - Release step is manual (trigger: manual) for safety
#   - Review tfplan.txt before approving infrastructure changes
#
# ============================================================================
