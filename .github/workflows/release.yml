name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Call release workflow
        uses: pipery-dev/pipery-tooling/.github/workflows/pipery-release.yml@main
        with:
          bump: ${{ inputs.bump }}
