name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          for f in src/*.sh; do
            if ! grep -q '^#!/usr/bin/env psh' "$f"; then
              shellcheck --shell=bash "$f"
            fi
          done

  test:
    runs-on: ubuntu-latest
    secrets: inherit
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install pipery-tooling
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install git+https://x-access-token:${GH_TOKEN}@github.com/pipery-dev/pipery-tooling.git
      - name: Run tests
        run: pipery-actions test --repo .
